# CPR Pivot Lab - Infrastructure
# PostgreSQL is used ONLY for operational data (agent sessions, signals, alerts)
# Market data (OHLCV candles) lives in Parquet files, queried via DuckDB

services:
  postgres:
    image: postgres:18-alpine
    container_name: cpr-pivot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cpr_pivot
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init_pg.sql:/docker-entrypoint-initdb.d/init_pg.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cpr_pivot"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pivot-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  pivot-network:
    driver: bridge
